<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDBV Pro | Cloud TikTok Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global state
        window.isPro = false;
        window.currentUser = null;

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gdbv-pro-app';

        // Auth Logic
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            window.currentUser = user;
            if (user) {
                const cloudStatus = document.getElementById('cloud-status');
                if (cloudStatus) {
                    cloudStatus.innerText = "Cloud Sync Active";
                    cloudStatus.classList.replace('text-gray-400', 'text-green-500');
                }
                
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile');
                const userDoc = await getDoc(userDocRef);
                
                if (userDoc.exists() && userDoc.data().isPro) {
                    activateProUI();
                }
            }
        });

        window.saveProToCloud = async () => {
            if (!window.currentUser) return;
            const userDocRef = doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'settings', 'profile');
            await setDoc(userDocRef, {
                isPro: true,
                activatedAt: new Date().toISOString(),
                userId: window.currentUser.uid
            }, { merge: true });
        };

        initAuth();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .dynamic-logo {
            background: linear-gradient(to right, #000000, #2563eb, #db2777, #7c3aed, #000000);
            background-size: 400% auto; -webkit-background-clip: text; background-clip: text; color: transparent;
            animation: gradient-flow 8s ease infinite;
        }
        .pro-gradient { background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%); }
        @keyframes gradient-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .loader { border: 2px solid #e2e8f0; border-top: 2px solid currentColor; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); }
        .format-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 8px; background: #e2e8f0; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #2563eb; cursor: pointer; margin-top: -6px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div onclick="resetToHome()" class="flex items-center gap-2 cursor-pointer group">
                    <div class="bg-black text-white p-1.5 rounded-lg group-hover:scale-105 transition-transform">
                        <i class="fab fa-tiktok text-xl"></i>
                    </div>
                    <span class="text-xl font-extrabold tracking-tight dynamic-logo uppercase">GDBV</span>
                    <span id="nav-pro-badge" class="hidden ml-1 pro-gradient text-white text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest shadow-lg">PRO</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex flex-col items-end">
                        <span id="cloud-status" class="text-[9px] font-black uppercase tracking-tighter text-gray-400">Connecting...</span>
                    </div>
                    <button onclick="toggleProModal(true)" id="upgrade-btn" class="pro-gradient hover:opacity-90 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition-all shadow-md">
                        <i class="fas fa-crown mr-1"></i> Activate
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- PRO Activation Modal -->
    <div id="pro-modal" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-yellow-200">
            <div class="p-8 text-center">
                <div class="w-16 h-16 rounded-full pro-gradient flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-lg shadow-yellow-500/40">
                    <i class="fas fa-crown"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-900 mb-2">Unlock GDBV Pro</h3>
                <p class="text-sm text-gray-500 mb-6">Enter your redemption code to unlock cloud-synced Pro features.</p>
                <input type="text" id="redeem-input" placeholder="XXXXX-XXXXX-XXXXX" 
                        class="w-full text-center font-mono text-lg font-bold border-2 border-gray-200 rounded-xl py-3 px-4 mb-4 uppercase">
                <button onclick="verifyProCode()" id="verify-btn" class="w-full pro-gradient text-white font-black py-4 rounded-xl shadow-xl active:scale-95 transition-all">
                    Redeem & Sync
                </button>
                <button onclick="toggleProModal(false)" class="w-full text-gray-400 font-bold py-3 mt-2 text-sm">Close</button>
            </div>
        </div>
    </div>

    <main class="flex-grow container max-w-4xl mx-auto px-4 py-8">
        <div id="hero-section" class="text-center mb-10">
            <h1 class="text-4xl font-black text-gray-900 mb-2">TikTok Downloader</h1>
            <p class="text-gray-500 font-medium">Download everything. Master anything. <span class="text-blue-600">Save to Cloud.</span></p>
        </div>

        <div id="input-container" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="tiktok-url" type="text" placeholder="Paste link here..." class="flex-grow px-6 py-4 border-2 border-gray-100 rounded-2xl bg-gray-50 outline-none focus:border-blue-500 transition-all font-medium">
                <button onclick="fetchVideoData()" id="fetch-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-8 py-4 rounded-2xl transition-all shadow-lg shadow-blue-500/20">Fetch Media</button>
            </div>
        </div>

        <div id="loading-state" class="hidden flex flex-col items-center py-12">
            <div class="loader text-blue-600 mb-4" style="width: 40px; height: 40px; border-width: 4px;"></div>
            <p class="text-gray-400 font-bold animate-pulse">Processing Media...</p>
        </div>

        <div id="result-section" class="hidden grid md:grid-cols-5 gap-8">
            <div class="md:col-span-2 space-y-4">
                <div class="bg-black rounded-3xl aspect-[9/16] overflow-hidden shadow-xl border-4 border-white">
                    <video id="video-player" class="w-full h-full object-cover" controls playsinline></video>
                </div>
                <div class="bg-white p-4 rounded-2xl text-center shadow-sm">
                    <p id="video-title" class="font-bold text-gray-900 truncate">Title</p>
                    <p id="video-author" class="text-blue-600 text-xs font-black">@author</p>
                </div>
            </div>

            <div class="md:col-span-3 space-y-6">
                <div class="flex bg-gray-100 p-1.5 rounded-2xl">
                    <button onclick="switchTab('download')" id="tab-download" class="flex-1 py-3 rounded-xl text-sm font-black bg-white text-blue-600 shadow-sm">Exports</button>
                    <button onclick="switchTab('lab')" id="tab-lab" class="flex-1 py-3 rounded-xl text-sm font-black text-gray-500">Audio Lab ✨</button>
                </div>

                <div id="content-download" class="space-y-6">
                    <div>
                        <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Video Formats</h3>
                        <div id="video-grid" class="format-grid"></div>
                    </div>
                    <div>
                        <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Audio Formats</h3>
                        <div id="audio-grid" class="format-grid"></div>
                    </div>
                </div>

                <div id="content-lab" class="hidden space-y-4">
                    <div class="bg-gray-900 p-6 rounded-3xl text-white space-y-4">
                        <div class="flex justify-between items-center">
                            <button onclick="togglePlay()" id="play-btn" class="bg-white text-black px-6 py-2 rounded-xl font-black">Play Preview</button>
                            <span id="lab-timer" class="font-mono text-xs">0:00 / 0:00</span>
                        </div>
                        <input type="range" id="lab-progress" value="0" min="0" max="100" step="0.1" oninput="seek(this.value)">
                    </div>
                    
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 space-y-4">
                        <div>
                            <div class="flex justify-between text-xs font-black mb-2"><span>Speed</span><span id="speed-val">1.00x</span></div>
                            <input type="range" id="speed-range" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updateLab('speed', this.value)">
                        </div>
                        <div id="pro-controls" class="hidden pt-4 border-t space-y-4">
                            <div>
                                <div class="flex justify-between text-xs font-black mb-2 text-yellow-600"><span>Bass Boost (PRO)</span><span id="bass-val">0dB</span></div>
                                <input type="range" id="bass-range" min="-10" max="20" step="1" value="0" oninput="updateLab('bass', this.value)">
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="renderAudio()" id="render-btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-colors">Export Master</button>
                </div>

                <button onclick="resetToHome()" class="w-full text-gray-400 font-bold text-sm">Download Another</button>
            </div>
        </div>
    </main>

    <script>
        let currentData = null;
        let audioCtx = null;
        let source = null;
        let bassNode = null;
        let gainNode = null;
        let audioBuffer = null;
        let startTime = 0;
        let offset = 0;
        let isPlaying = false;
        let animationFrame = null;

        const vFormats = ["MP4", "WEBM (Pro)", "MOV (Pro)", "MKV (Pro)", "AVI (Pro)", "GIF (Pro)"];
        const aFormats = ["MP3", "AAC", "WAV (Pro)", "FLAC (Pro)", "OGG (Pro)", "M4A (Pro)"];

        function toggleProModal(s) { document.getElementById('pro-modal').classList.toggle('hidden', !s); }

        function activateProUI() {
            window.isPro = true;
            const badge = document.getElementById('nav-pro-badge');
            const upBtn = document.getElementById('upgrade-btn');
            const controls = document.getElementById('pro-controls');
            if (badge) badge.classList.remove('hidden');
            if (upBtn) upBtn.classList.add('hidden');
            if (controls) controls.classList.remove('hidden');
            buildGrids();
        }

        async function verifyProCode() {
            const code = document.getElementById('redeem-input').value.trim().toUpperCase();
            const regex = /^[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}$/;
            if (regex.test(code)) {
                activateProUI();
                toggleProModal(false);
                if (window.saveProToCloud) await window.saveProToCloud();
            } else {
                alert("Invalid Redemption Code.");
            }
        }

        function buildGrids() {
            const fill = (id, list, isV) => {
                const container = document.getElementById(id);
                if (!container) return;
                container.innerHTML = list.map(f => {
                    const isLocked = f.includes('(Pro)') && !window.isPro;
                    return `
                        <button onclick="exportMedia('${f}', ${isV})" class="bg-white border rounded-2xl p-4 flex flex-col items-center justify-center gap-2 hover:border-blue-500 transition-all ${isLocked ? 'opacity-50' : ''}">
                            <i class="fas ${isV ? 'fa-video' : 'fa-music'} ${isLocked ? 'text-gray-300' : (isV ? 'text-blue-500' : 'text-pink-500')}"></i>
                            <span class="text-[10px] font-bold">${f.replace(' (Pro)', '')}</span>
                            ${isLocked ? '<i class="fas fa-lock text-[8px] text-yellow-500"></i>' : ''}
                        </button>
                    `;
                }).join('');
            };
            fill('video-grid', vFormats, true);
            fill('audio-grid', aFormats, false);
        }

        async function fetchVideoData() {
            const url = document.getElementById('tiktok-url').value;
            if(!url) return;
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('input-container').classList.add('hidden');
            
            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`).then(r => r.json());
                currentData = res.data;
                document.getElementById('video-player').src = currentData.play;
                document.getElementById('video-title').innerText = currentData.title;
                document.getElementById('video-author').innerText = `@${currentData.author.unique_id}`;
                buildGrids();
                document.getElementById('result-section').classList.remove('hidden');
                
                // Initialize Audio Lab Buffer
                const ab = await fetch(currentData.music).then(r => r.arrayBuffer());
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioBuffer = await audioCtx.decodeAudioData(ab);
            } catch(e) { 
                console.error(e);
                alert("Failed to fetch media."); 
                resetToHome(); 
            }
            document.getElementById('loading-state').classList.add('hidden');
        }

        function togglePlay() {
            if (!audioBuffer) return;
            if (isPlaying) {
                stopAudio();
            } else {
                startAudio();
            }
        }

        function startAudio() {
            if (isPlaying) return;
            isPlaying = true;
            document.getElementById('play-btn').innerText = "Stop Preview";
            
            source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            
            // Nodes
            bassNode = audioCtx.createBiquadFilter();
            bassNode.type = "lowshelf";
            bassNode.frequency.value = 200;
            bassNode.gain.value = window.isPro ? parseFloat(document.getElementById('bass-range').value) : 0;
            
            source.playbackRate.value = parseFloat(document.getElementById('speed-range').value);
            
            source.connect(bassNode);
            bassNode.connect(audioCtx.destination);
            
            startTime = audioCtx.currentTime;
            source.start(0, offset);
            source.onended = () => { if(isPlaying) stopAudio(); };
            
            updateProgress();
        }

        function stopAudio() {
            if (!isPlaying) return;
            isPlaying = false;
            document.getElementById('play-btn').innerText = "Play Preview";
            cancelAnimationFrame(animationFrame);
            
            const playbackRate = parseFloat(document.getElementById('speed-range').value);
            offset += (audioCtx.currentTime - startTime) * playbackRate;
            if (offset >= audioBuffer.duration) offset = 0;
            
            if (source) {
                source.stop();
                source.disconnect();
            }
        }

        function seek(val) {
            const wasPlaying = isPlaying;
            if (isPlaying) stopAudio();
            offset = (val / 100) * audioBuffer.duration;
            if (wasPlaying) startAudio();
            updateTimerDisplay();
        }

        function updateProgress() {
            if (!isPlaying) return;
            const playbackRate = parseFloat(document.getElementById('speed-range').value);
            const currentPos = offset + (audioCtx.currentTime - startTime) * playbackRate;
            const progress = (currentPos / audioBuffer.duration) * 100;
            
            document.getElementById('lab-progress').value = progress;
            updateTimerDisplay(currentPos);
            
            if (currentPos < audioBuffer.duration) {
                animationFrame = requestAnimationFrame(updateProgress);
            }
        }

        function updateTimerDisplay(current = offset) {
            const format = s => {
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return `${m}:${sec.toString().padStart(2, '0')}`;
            };
            document.getElementById('lab-timer').innerText = `${format(current)} / ${format(audioBuffer.duration)}`;
        }

        function updateLab(type, val) {
            if(type === 'speed') {
                document.getElementById('speed-val').innerText = `${parseFloat(val).toFixed(2)}x`;
                if (isPlaying && source) source.playbackRate.value = parseFloat(val);
            }
            if(type === 'bass') {
                document.getElementById('bass-val').innerText = `${val}dB`;
                if (isPlaying && bassNode && window.isPro) bassNode.gain.value = parseFloat(val);
            }
        }

        function switchTab(t) {
            document.getElementById('content-download').classList.toggle('hidden', t !== 'download');
            document.getElementById('content-lab').classList.toggle('hidden', t !== 'lab');
            document.getElementById('tab-download').className = t === 'download' ? "flex-1 py-3 rounded-xl text-sm font-black bg-white text-blue-600 shadow-sm" : "flex-1 py-3 rounded-xl text-sm font-black text-gray-500";
            document.getElementById('tab-lab').className = t === 'lab' ? "flex-1 py-3 rounded-xl text-sm font-black bg-white text-blue-600 shadow-sm" : "flex-1 py-3 rounded-xl text-sm font-black text-gray-500";
            if (t !== 'lab' && isPlaying) stopAudio();
        }

        function resetToHome() { location.reload(); }
        
        function exportMedia(f, isV) {
            if(f.includes('(Pro)') && !window.isPro) return toggleProModal(true);
            const url = isV ? currentData.play : currentData.music;
            const a = document.createElement('a');
            a.href = url;
            a.target = "_blank";
            a.download = `GDBV_Export_${Date.now()}`;
            a.click();
        }

        async function renderAudio() {
            if (!audioBuffer) return;
            const btn = document.getElementById('render-btn');
            const originalText = btn.innerText;
            btn.innerText = "Mastering Audio...";
            btn.disabled = true;

            // Simple mock render - for a real app, you'd use OfflineAudioContext
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = currentData.music;
                a.download = `GDBV_Master_${Date.now()}.mp3`;
                a.click();
                btn.innerText = originalText;
                btn.disabled = false;
            }, 1500);
        }
    </script>
</body>
</html>
